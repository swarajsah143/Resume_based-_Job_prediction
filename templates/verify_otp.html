<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email — ResumeAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/auth.css">
    <style>
        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 8px 0 4px;
        }

        .otp-inputs input {
            width: 52px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            font-family: var(--font);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
            caret-color: var(--accent);
        }

        .otp-inputs input:focus {
            border-color: var(--accent);
            background: rgba(99,102,241,0.08);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15), 0 0 20px rgba(99,102,241,0.08);
            transform: translateY(-2px);
        }

        .otp-inputs input.filled {
            border-color: var(--green);
            background: rgba(16,185,129,0.06);
        }

        .otp-inputs input.error {
            border-color: var(--red);
            background: rgba(239,68,68,0.06);
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .email-display {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(99,102,241,0.08);
            border: 1px solid rgba(99,102,241,0.15);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.85rem;
            color: var(--primary-light);
            font-weight: 500;
            margin-top: 10px;
        }

        .email-display svg {
            width: 14px; height: 14px;
            flex-shrink: 0;
        }

        .timer-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 4px;
        }

        .timer {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .timer.expired { color: var(--red); }

        .resend-btn {
            background: none;
            border: none;
            font-family: var(--font);
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--primary-light);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .resend-btn:hover:not(:disabled) {
            color: var(--cyan);
            background: rgba(99,102,241,0.08);
        }

        .resend-btn:disabled {
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            color: var(--text-muted);
            transition: color 0.2s;
            margin-top: 8px;
        }

        .back-link:hover { color: var(--text-secondary); }
        .back-link svg { width: 14px; height: 14px; }
    </style>
</head>
<body>

    <div class="auth-bg">
        <div class="grid-lines"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="/" class="auth-logo">
                    <span class="logo-icon">&#9670;</span>
                    <span>ResumeAI</span>
                </a>
                <h1 class="auth-title">Verify your email</h1>
                <p class="auth-subtitle">We sent a 6-digit code to</p>
                <div class="email-display">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M22 4l-10 8L2 4"/></svg>
                    <span id="emailDisplay">{{ email }}</span>
                </div>
            </div>

            <div class="alert alert-error" id="alertBox">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                <span id="alertText"></span>
            </div>

            <form class="auth-form" id="otpForm" novalidate>
                <div class="form-group">
                    <label style="text-align:center;">Enter verification code</label>
                    <div class="otp-inputs" id="otpInputs">
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code" data-index="0">
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="1">
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="2">
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="3">
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="4">
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="5">
                    </div>
                </div>

                <div class="timer-row">
                    <span class="timer" id="timer">Code expires in 5:00</span>
                    <button type="button" class="resend-btn" id="resendBtn" disabled>Resend Code</button>
                </div>

                <button type="submit" class="btn-auth btn-auth-primary" id="verifyBtn">
                    <span class="btn-text">Verify & Create Account</span>
                </button>
            </form>

            <div class="auth-footer">
                <a href="/register" class="back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    Back to Sign Up
                </a>
            </div>
        </div>
    </div>

    <script>
        const email = '{{ email }}';
        const inputs = document.querySelectorAll('.otp-inputs input');
        const form = document.getElementById('otpForm');
        const verifyBtn = document.getElementById('verifyBtn');
        const resendBtn = document.getElementById('resendBtn');
        const timerEl = document.getElementById('timer');

        // ─── OTP Input behavior ────────────────────────────
        inputs.forEach((input, i) => {
            input.addEventListener('input', (e) => {
                const val = e.target.value.replace(/\D/g, '');
                e.target.value = val.charAt(0) || '';

                if (val && i < 5) inputs[i + 1].focus();

                e.target.classList.remove('error');
                if (val) e.target.classList.add('filled');
                else e.target.classList.remove('filled');

                // Auto-submit when all 6 digits entered
                const otp = getOtp();
                if (otp.length === 6) submitOtp();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && i > 0) {
                    inputs[i - 1].focus();
                    inputs[i - 1].value = '';
                    inputs[i - 1].classList.remove('filled');
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasted = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
                pasted.split('').forEach((ch, j) => {
                    if (inputs[j]) {
                        inputs[j].value = ch;
                        inputs[j].classList.add('filled');
                    }
                });
                if (pasted.length > 0) inputs[Math.min(pasted.length, 5)].focus();
                if (pasted.length === 6) submitOtp();
            });
        });

        inputs[0].focus();

        function getOtp() {
            return Array.from(inputs).map(i => i.value).join('');
        }

        function showAlert(message, type) {
            const box = document.getElementById('alertBox');
            const text = document.getElementById('alertText');
            box.className = `alert alert-${type} show`;
            text.textContent = message;
        }

        function shakeInputs() {
            inputs.forEach(i => {
                i.classList.add('error');
                i.classList.remove('filled');
            });
        }

        // ─── Timer ─────────────────────────────────────────
        let secondsLeft = {{ otp_expiry_minutes | default(5) }} * 60;
        let resendCooldown = 60;

        function updateTimer() {
            if (secondsLeft <= 0) {
                timerEl.textContent = 'Code expired';
                timerEl.classList.add('expired');
                return;
            }
            const m = Math.floor(secondsLeft / 60);
            const s = secondsLeft % 60;
            timerEl.textContent = `Code expires in ${m}:${s.toString().padStart(2, '0')}`;
            secondsLeft--;
            setTimeout(updateTimer, 1000);
        }
        updateTimer();

        function startResendCooldown() {
            resendBtn.disabled = true;
            let cd = resendCooldown;
            const tick = () => {
                if (cd <= 0) {
                    resendBtn.disabled = false;
                    resendBtn.textContent = 'Resend Code';
                    return;
                }
                resendBtn.textContent = `Resend (${cd}s)`;
                cd--;
                setTimeout(tick, 1000);
            };
            tick();
        }
        startResendCooldown();

        // ─── Submit OTP ────────────────────────────────────
        async function submitOtp() {
            const otp = getOtp();
            if (otp.length !== 6) {
                showAlert('Please enter all 6 digits', 'error');
                return;
            }

            verifyBtn.classList.add('loading');

            try {
                const res = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp }),
                });
                const data = await res.json();
                verifyBtn.classList.remove('loading');

                if (res.ok) {
                    showAlert(data.message || 'Verified!', 'success');
                    setTimeout(() => { window.location.href = data.redirect || '/dashboard'; }, 800);
                } else {
                    showAlert(data.error || 'Verification failed', 'error');
                    shakeInputs();
                    // Clear inputs for retry
                    inputs.forEach(i => { i.value = ''; i.classList.remove('filled'); });
                    inputs[0].focus();
                }
            } catch (err) {
                verifyBtn.classList.remove('loading');
                showAlert('Network error. Please try again.', 'error');
            }
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            submitOtp();
        });

        // ─── Resend OTP ───────────────────────────────────
        resendBtn.addEventListener('click', async () => {
            resendBtn.disabled = true;

            try {
                const res = await fetch('/api/resend-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });
                const data = await res.json();

                if (res.ok) {
                    showAlert(data.message || 'New code sent!', 'success');
                    // Reset timer
                    secondsLeft = 5 * 60;
                    timerEl.classList.remove('expired');
                    updateTimer();
                    startResendCooldown();
                    // Clear inputs
                    inputs.forEach(i => { i.value = ''; i.classList.remove('filled', 'error'); });
                    inputs[0].focus();
                } else {
                    showAlert(data.error || 'Failed to resend', 'error');
                    startResendCooldown();
                }
            } catch (err) {
                showAlert('Network error.', 'error');
                startResendCooldown();
            }
        });
    </script>
</body>
</html>
